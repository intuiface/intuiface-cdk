name: Intuiface-CDK Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:

  publish-gpr:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write   # OIDC
    steps:
      - name: Determine publish mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [[ "${{ github.ref_name }}" != release-please--branches--master* ]]; then
              echo "Branch '${{ github.ref_name }}' can't be pre-released. Only RC branch from release-please can be published."
              exit 1
            fi

            echo "tag=next" >> "$GITHUB_OUTPUT"
            echo "pre_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "pre_release=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          scope: '@intuiface'

      - name: Compute pre-release version
        if: steps.mode.outputs.pre_release == 'true'
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          PRE_VERSION="${BASE_VERSION}-rc.${SHORT_SHA}"
          echo "pre_version=$PRE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Pre-release version: $PRE_VERSION"

      - name : Install dependencies
        run: npm ci

      - name: Set pre-release version in all packages
        if: steps.mode.outputs.pre_release == 'true'
        run: node set-prerelease-version.mjs "${{ steps.version.outputs.pre_version }}"
        
      - name : Build packages
        run: npm run build

      - name: Publish core to npmjs packages
        run: npm publish dist/libs/core --access public --tag ${{ steps.mode.outputs.tag }}

      - name: Publish components to npmjs packages
        run: npm publish dist/libs/components --access public --tag ${{ steps.mode.outputs.tag }}

      - name: Publish cli to npmjs packages
        run: npm publish dist/libs/cli --access public --tag ${{ steps.mode.outputs.tag }}

      - name: Publish interface-asset to npmjs packages
        run: npm publish dist/libs/tools/interface-asset-schematics --access public --tag ${{ steps.mode.outputs.tag }}

      - name: Publish binding-converter to npmjs packages
        run: npm publish dist/libs/tools/binding-converter-schematics --access public --tag ${{ steps.mode.outputs.tag }}